<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nous · Post Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #f4f3f0;
      --surface:    #ffffff;
      --border:     #e4e2dc;
      --text:       #1a1a1a;
      --muted:      #737373;
      --nous:       #F0A020;
      --nous-light: #FEF6E0;
      --green:      #16a34a; --green-bg:  #dcfce7;
      --amber:      #b45309; --amber-bg:  #fef3c7;
      --red:        #dc2626; --red-bg:    #fee2e2;
      --blue:       #2563eb; --blue-bg:   #dbeafe;
      --skull:      #6b7280; --skull-bg:  #f3f4f6;
      --orange:     #ea580c; --orange-bg: #ffedd5;
      --gold:       #854d0e; --gold-bg:   #fef9c3;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

    /* HEADER */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 16px; font-weight: 700; color: var(--nous); letter-spacing: -.02em; }
    .logo-sub { font-weight: 400; color: var(--muted); font-size: 13px; margin-left: 10px; }
    .page-tabs { display: flex; gap: 0; height: 100%; }
    .page-tab { padding: 0 18px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; display: flex; align-items: center; color: var(--muted); transition: color .15s; }
    .page-tab:hover { color: var(--text); }
    .page-tab.active { color: var(--nous); border-bottom-color: var(--nous); font-weight: 600; }
    .header-right { font-size: 12px; color: var(--muted); }

    /* POST TABS */
    .post-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; overflow-x: auto; scrollbar-width: none; }
    .post-nav::-webkit-scrollbar { display: none; }
    .post-tab { padding: 11px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .post-tab:hover { color: var(--text); }
    .post-tab.active { color: var(--nous); border-bottom-color: var(--nous); font-weight: 600; }
    .ac-pill { background: var(--bg); border-radius: 99px; padding: 1px 7px; font-size: 11px; font-weight: 500; }
    .post-tab.active .ac-pill { background: var(--nous-light); color: var(--nous); }

    /* LAYOUT */
    .main { display: grid; grid-template-columns: 300px 1fr; gap: 24px; max-width: 1280px; margin: 0 auto; padding: 24px 28px; align-items: start; }
    .analysis { display: flex; flex-direction: column; gap: 16px; }

    /* IMAGE PANEL */
    .image-panel { position: sticky; top: 80px; }
    .story-frame { width: 100%; aspect-ratio: 9/16; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 24px rgba(0,0,0,.14); background: #111; }
    .story-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .image-footer { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); }
    .notion-link { color: var(--muted); text-decoration: none; font-size: 12px; }
    .notion-link:hover { color: var(--text); }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .card-head { padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
    .card-body { padding: 18px; }

    /* TITLE CARD */
    .post-name { font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
    .post-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: var(--bg); border-radius: 6px; padding: 3px 9px; font-size: 12px; color: var(--muted); }
    .ig-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); transition: all .15s; white-space: nowrap; flex-shrink: 0; }
    .ig-link:hover { color: #c13584; border-color: #c13584; }

    /* CAMPAIGN TIMELINE */
    .campaign-timeline { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .campaign-tl-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 12px; }
    .campaign-tl-track { display: flex; align-items: flex-start; }
    .campaign-tl-connector { flex: 1; height: 2px; background: var(--border); margin-top: 4px; align-self: flex-start; }
    .campaign-tl-item { display: flex; flex-direction: column; align-items: center; min-width: 72px; }
    .campaign-tl-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .campaign-tl-dot.current  { background: var(--nous); border-color: var(--nous); box-shadow: 0 0 0 3px var(--nous-light); }
    .campaign-tl-dot.past     { background: var(--green); border-color: var(--green); }
    .campaign-tl-dot.future   { background: var(--surface); border-color: var(--border); }
    .campaign-tl-dot.missing  { background: var(--bg); border-color: var(--border); }
    .campaign-tl-info { margin-top: 8px; text-align: center; }
    .campaign-tl-label { font-size: 11px; font-weight: 600; color: var(--muted); }
    .campaign-tl-label.current  { color: var(--nous); }
    .campaign-tl-label.past     { color: var(--green); }
    .campaign-tl-date   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .campaign-tl-detail { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .campaign-tl-now    { font-size: 9px; font-weight: 700; color: var(--nous); text-transform: uppercase; letter-spacing: .04em; margin-top: 3px; }

    /* DASHBOARD ROW */
    .dashboard-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .dash-head { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
    .dash-body { padding: 14px; }

    /* Performance card */
    .dash-kpi-pair { display: flex; flex-direction: column; gap: 10px; }
    .dash-kpi { display: flex; align-items: baseline; gap: 6px; }
    .dash-kpi-val { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -.03em; }
    .dash-kpi-val.green { color: var(--green); } .dash-kpi-val.amber { color: var(--amber); } .dash-kpi-val.red { color: var(--red); }
    .dash-kpi-meta { display: flex; flex-direction: column; }
    .dash-kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .dash-kpi-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .dash-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .dash-ecac { display: flex; align-items: center; gap: 8px; }
    .dash-ecac-emoji { font-size: 20px; line-height: 1; }
    .ecac-tier { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 2px 6px; border-radius: 99px; margin-top: 2px; }
    .tier-skull  { background: var(--skull-bg);  color: var(--skull);  }
    .tier-red    { background: var(--red-bg);    color: var(--red);    }
    .tier-orange { background: var(--orange-bg); color: var(--orange); }
    .tier-green  { background: var(--green-bg);  color: var(--green);  }
    .tier-gold   { background: var(--gold-bg);   color: var(--gold);   }

    /* Brief card */
    .dash-mini-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .dash-mini-check { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 6px; border-radius: 6px; }
    .dash-mini-check.pass { background: var(--green-bg); color: #14532d; }
    .dash-mini-check.fail { background: var(--red-bg);   color: #7f1d1d; }

    /* Meta card */
    .dash-meta-dims { display: flex; flex-direction: column; gap: 5px; }
    .dash-meta-dim { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 4px 6px; border-radius: 6px; }
    .dash-meta-dim.this-pass { background: var(--green-bg); }
    .dash-meta-dim.this-fail { background: var(--red-bg); }
    .dash-meta-label { flex: 1; color: var(--text); }
    .dash-meta-dim.this-pass .dash-meta-label { color: #14532d; }
    .dash-meta-dim.this-fail .dash-meta-label { color: #7f1d1d; }
    .dash-meta-this { font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .dash-meta-pct { font-size: 10px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    /* WHAT WE SAID */
    .review-comment { background: var(--bg); border-radius: 9px; padding: 11px 13px; font-size: 13px; line-height: 1.6; }
    .review-meta { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* REVIEW REFLECTION */
    .reflection-rows { display: flex; flex-direction: column; gap: 8px; }
    .reflection-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; border-radius: 9px; font-size: 13px; line-height: 1.55; }
    .reflection-row.good    { background: var(--green-bg); color: #14532d; }
    .reflection-row.missed  { background: var(--amber-bg); color: var(--amber); }
    .reflection-row.pending { background: var(--skull-bg); color: var(--skull); font-style: italic; }

    /* META PAGE */
    .meta-placeholder { max-width: 600px; margin: 80px auto; text-align: center; padding: 0 20px; }
    .meta-placeholder h2 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .meta-placeholder p { font-size: 14px; color: var(--muted); line-height: 1.7; }
    .meta-placeholder .coming { display: inline-block; background: var(--amber-bg); color: var(--amber); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 99px; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .06em; }
    .meta-sections { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; max-width: 900px; margin-left: auto; margin-right: auto; }
    .meta-section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: left; }
    .meta-section-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .meta-section-card p { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .meta-section-card .meta-icon { font-size: 24px; margin-bottom: 10px; }

    /* ARROW NAV */
    .arrow-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 48px; }
    .arrow-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text); transition: all .15s; display: flex; align-items: center; gap: 6px; }
    .arrow-btn:hover:not(:disabled) { border-color: var(--nous); color: var(--nous); background: var(--nous-light); }
    .arrow-btn:disabled { opacity: .35; cursor: default; }
    .arrow-center { text-align: center; font-size: 13px; }
    .arrow-counter { font-size: 11px; color: var(--muted); margin-top: 1px; }
    /* STRONG BADGE */
    .strong-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--gold-bg); color: var(--gold); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 99px; border: 1px solid #ca8a04; letter-spacing: .03em; }
    /* FORECAST ROW */
    .forecast-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 7px 0; border-top: 1px solid var(--border); margin-top: 6px; }
    .forecast-hit { font-weight: 700; font-size: 12px; }
    .forecast-hit.over { color: var(--green); }
    .forecast-hit.under { color: var(--amber); }
    /* MONTH PILLS */
    .month-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; gap: 8px; height: 44px; overflow-x: auto; scrollbar-width: none; }
    .month-nav::-webkit-scrollbar { display: none; }
    .month-pill { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 4px 13px; font-size: 12px; cursor: pointer; color: var(--muted); display: flex; align-items: center; gap: 5px; transition: all .15s; white-space: nowrap; flex-shrink: 0; }
    .month-pill:hover { color: var(--text); border-color: var(--text); }
    .month-pill.active { background: var(--nous); border-color: var(--nous); color: #fff; font-weight: 600; }
    .month-pill-count { font-size: 10px; opacity: .75; }
    /* META STATS */
    .meta-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .meta-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .meta-stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
    .meta-stat-val { font-size: 30px; font-weight: 900; letter-spacing: -.03em; line-height: 1; }
    .meta-stat-label { font-size: 11px; color: var(--muted); margin-top: 5px; }
    /* REVIEW SECTION */
    .review-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="logo">nous</span>
    <span class="logo-sub">Post Analysis</span>
  </div>
  <div class="page-tabs">
    <div class="page-tab active" onclick="showPage('posts')" id="tab-posts">Posts</div>
    <div class="page-tab" onclick="showPage('meta')" id="tab-meta">Meta Analysis</div>
  </div>
  <div class="header-right" id="header-count"></div>
</header>

<div class="month-nav" id="month-nav"></div>

<nav class="arrow-nav" id="arrow-nav">
  <button class="arrow-btn" id="btn-prev" onclick="prevPost()">← Prev</button>
  <div class="arrow-center">
    <div id="arrow-name" style="font-weight:600;font-size:14px"></div>
    <div class="arrow-counter" id="arrow-counter"></div>
  </div>
  <button class="arrow-btn" id="btn-next" onclick="nextPost()">Next →</button>
</nav>

<div id="posts-view">
  <div class="main" id="main-content"></div>
</div>

<div id="meta-view" style="display:none; padding: 24px 28px; max-width: 1280px; margin: 0 auto;">
  <div id="meta-content"></div>
</div>

// ── DATA PREP ─────────────────────────────────────────────────────────────────
const TODAY_STR = '2026-03-05';
const MONTH_ORDER = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};

function parseIsoDate(dateStr) {
  // "19 Mar 2026" → "2026-03-19"
  const mn = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const parts = dateStr.trim().split(/\s+/);
  if (parts.length < 3) return '';
  return parts[2] + '-' + (mn[parts[1]] || '01') + '-' + parts[0].padStart(2,'0');
}

function getMonthKey(p) {
  const parts = p.date.trim().split(/\s+/);
  return parts.length >= 3 ? parts[1] + ' ' + parts[2] : p.date;
}

// ── BRIEF TYPE LOOKUP ─────────────────────────────────────────────────────────
const NICHE_PREFIX = {
  Family: 'family', Celebrity: 'celebrity', Home: 'home',
  Fashion: 'fashion', Lifestyle: 'lifestyle', Finance: 'finance_lifestyle', Fitness: 'lifestyle'
};
function getBriefType(post) {
  const prefix = NICHE_PREFIX[post.niche] || 'family';
  const seq = post.post_sequence || 1;
  return briefTypes[`${prefix}_post${seq}`] || null;
}

// eCAC from delegations only
function postEcac(perf) {
  if (perf.post_fee && perf.delegations && perf.delegations > 0)
    return Math.round(perf.post_fee / perf.delegations);
  return null;
}

// Only past posts with computable eCAC (delegations > 0 and post_fee > 0)
const displayPosts = posts.filter(p => {
  if (parseIsoDate(p.date) > TODAY_STR) return false;
  const perf = p.performance;
  return perf.delegations && perf.delegations > 0 && perf.post_fee && perf.post_fee > 0;
});

// Unique month keys, most recent first (preserving array order)
const allMonthKeys = [];
displayPosts.forEach(p => {
  const mk = getMonthKey(p);
  if (!allMonthKeys.includes(mk)) allMonthKeys.push(mk);
});

// ── META DATA ─────────────────────────────────────────────────────────────────
function computeBcRates(group) {
  const rates = {};
  if (!group.length) return rates;
  posts[0].brief_compliance.map(c => c.label).forEach(label => {
    const passing = group.filter(p => p.brief_compliance.find(c => c.label === label && c.pass)).length;
    rates[label] = { passing, total: group.length, pct: Math.round(passing / group.length * 100) };
  });
  return rates;
}

const beatForecastPosts = displayPosts.filter(p => {
  const ex = postExtras[p.id] || {};
  return ex.forecast_ac != null && p.performance.accounts_created != null && p.performance.accounts_created >= ex.forecast_ac;
});
const metaPosts = beatForecastPosts.length >= 5 ? beatForecastPosts : displayPosts;
const metaRates = computeBcRates(metaPosts);

// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedMonthKey = allMonthKeys[0] || '';
let currentIdx = 0;

function getMonthPosts() {
  return displayPosts.filter(p => getMonthKey(p) === selectedMonthKey);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function eCAcRating(ecac) {
  if (ecac == null) return { emoji: '☠️', tier: 'No data',    cls: 'skull'  };
  if (ecac > 200)   return { emoji: '☠️', tier: 'Over £200',  cls: 'skull'  };
  if (ecac > 100)   return { emoji: '🔴', tier: '£101–£200',  cls: 'red'    };
  if (ecac > 71)    return { emoji: '🟠', tier: '£72–£100',   cls: 'orange' };
  if (ecac > 40)    return { emoji: '🟢', tier: '£41–£71',    cls: 'green'  };
  return                   { emoji: '🤑', tier: 'Under £40',  cls: 'gold'   };
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function prevPost() { if (currentIdx > 0) renderPost(currentIdx - 1); }
function nextPost() { const mp = getMonthPosts(); if (currentIdx < mp.length - 1) renderPost(currentIdx + 1); }
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevPost();
  if (e.key === 'ArrowRight') nextPost();
});

function updateArrowNav(idx) {
  currentIdx = idx;
  const mp = getMonthPosts();
  const p = mp[idx];
  document.getElementById('arrow-name').textContent = p.name + ' — Post ' + p.post_sequence;
  document.getElementById('arrow-counter').textContent = 'Post ' + (idx + 1) + ' of ' + mp.length + ' · ' + selectedMonthKey;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === mp.length - 1;
  document.getElementById('header-count').textContent = displayPosts.length + ' posts';
}

// ── MONTH PILLS ───────────────────────────────────────────────────────────────
function renderMonthNav() {
  const el = document.getElementById('month-nav');
  if (!el) return;
  el.innerHTML = allMonthKeys.map(mk => {
    const count = displayPosts.filter(p => getMonthKey(p) === mk).length;
    const active = mk === selectedMonthKey ? 'active' : '';
    return `<button class="month-pill ${active}" onclick="selectMonth('${mk}')">${mk} <span class="month-pill-count">${count}</span></button>`;
  }).join('');
}

function selectMonth(mk) {
  selectedMonthKey = mk;
  renderMonthNav();
  renderPost(0);
}

// ── PAGE NAV ──────────────────────────────────────────────────────────────────
function showPage(page) {
  document.getElementById('posts-view').style.display = page === 'posts' ? '' : 'none';
  document.getElementById('meta-view').style.display  = page === 'meta'  ? '' : 'none';
  document.getElementById('month-nav').style.display  = page === 'posts' ? '' : 'none';
  document.getElementById('arrow-nav').style.display  = page === 'posts' ? '' : 'none';
  document.getElementById('tab-posts').classList.toggle('active', page === 'posts');
  document.getElementById('tab-meta').classList.toggle('active',  page === 'meta');
  if (page === 'meta') renderMetaPage();
}

// ── META PAGE ─────────────────────────────────────────────────────────────────
function renderMetaPage() {
  const container = document.getElementById('meta-content');
  if (!container) return;

  const past = displayPosts;
  const ecacs = past.map(p => postEcac(p.performance)).filter(e => e != null && e > 0);
  const avgEcac = ecacs.length ? Math.round(ecacs.reduce((a,b) => a+b,0) / ecacs.length) : null;
  const under70 = ecacs.filter(e => e < 70).length;
  const under40 = ecacs.filter(e => e < 40).length;

  const tiers = [
    { label: 'Under £40',   fn: e => e < 40,              cls: 'gold'   },
    { label: '£41–£70',     fn: e => e >= 40 && e <= 70,  cls: 'green'  },
    { label: '£71–£100',    fn: e => e > 70 && e <= 100,  cls: 'orange' },
    { label: '£101–£200',   fn: e => e > 100 && e <= 200, cls: 'red'    },
    { label: 'Over £200',   fn: e => e > 200,             cls: 'skull'  },
  ];
  const tierBars = tiers.map(t => {
    const count = ecacs.filter(t.fn).length;
    const pct = ecacs.length ? Math.round(count / ecacs.length * 100) : 0;
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">
      <div style="width:80px;font-size:11px;color:var(--muted);flex-shrink:0">${t.label}</div>
      <div style="flex:1;background:var(--bg);border-radius:99px;height:8px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:var(--${t.cls});border-radius:99px"></div>
      </div>
      <div style="width:28px;font-size:11px;text-align:right;color:var(--muted);flex-shrink:0">${count}</div>
    </div>`;
  }).join('');

  const allBcRates = computeBcRates(past);
  const bcBars = posts[0].brief_compliance.map(c => c.label).map(label => {
    const best = metaRates[label] || { pct: 0 };
    const all  = allBcRates[label] || { pct: 0 };
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span>${label}</span>
        <span style="color:var(--muted)">${best.pct}% beat-forecast · ${all.pct}% all</span>
      </div>
      <div style="background:var(--bg);border-radius:99px;height:6px;overflow:hidden">
        <div style="width:${best.pct}%;height:100%;background:var(--green);border-radius:99px"></div>
      </div>
    </div>`;
  }).join('');

  // By niche
  const niches = {};
  past.forEach(p => {
    if (!niches[p.niche]) niches[p.niche] = { count: 0, ecacs: [], bf: 0 };
    niches[p.niche].count++;
    const e = postEcac(p.performance);
    if (e != null && e > 0) niches[p.niche].ecacs.push(e);
    const ex = postExtras[p.id] || {};
    if (ex.forecast_ac != null && p.performance.accounts_created >= ex.forecast_ac) niches[p.niche].bf++;
  });
  const nicheRows = Object.entries(niches).sort((a,b) => b[1].count - a[1].count).map(([n,d]) => {
    const avg  = d.ecacs.length ? Math.round(d.ecacs.reduce((a,b)=>a+b,0)/d.ecacs.length) : null;
    const best = d.ecacs.length ? Math.min(...d.ecacs) : null;
    return `<tr style="border-top:1px solid var(--border)">
      <td style="padding:7px 12px 7px 0;font-size:12px">${n}</td>
      <td style="padding:7px 8px;font-size:12px;text-align:right">${d.count}</td>
      <td style="padding:7px 8px;font-size:12px;text-align:right">${d.bf}</td>
      <td style="padding:7px 8px;font-size:12px;text-align:right">${avg != null ? '£'+avg : '—'}</td>
      <td style="padding:7px 0;font-size:12px;text-align:right">${best != null ? '£'+best : '—'}</td>
    </tr>`;
  }).join('');

  // By post sequence
  const seqs = {};
  past.forEach(p => {
    const s = p.post_sequence || '?';
    if (!seqs[s]) seqs[s] = { count: 0, ecacs: [] };
    seqs[s].count++;
    const e = postEcac(p.performance);
    if (e != null && e > 0) seqs[s].ecacs.push(e);
  });
  const seqRows = Object.entries(seqs).sort((a,b) => +a[0]-(+b[0])).map(([s,d]) => {
    const avg = d.ecacs.length ? Math.round(d.ecacs.reduce((a,b)=>a+b,0)/d.ecacs.length) : null;
    return `<tr style="border-top:1px solid var(--border)">
      <td style="padding:7px 12px 7px 0;font-size:12px">Post ${s}</td>
      <td style="padding:7px 8px;font-size:12px;text-align:right">${d.count}</td>
      <td style="padding:7px 0;font-size:12px;text-align:right">${avg != null ? '£'+avg : '—'}</td>
    </tr>`;
  }).join('');

  // Per-brief-type breakdown
  const briefGroups = {};
  past.forEach(p => {
    const bt = getBriefType(p);
    const key = bt ? bt.id : `${p.niche}_post${p.post_sequence}`;
    const label = bt ? bt.name : `${p.niche} — Post ${p.post_sequence}`;
    if (!briefGroups[key]) briefGroups[key] = { label, count: 0, ecacs: [], bf: 0 };
    briefGroups[key].count++;
    const e = postEcac(p.performance);
    if (e != null && e > 0) briefGroups[key].ecacs.push(e);
    const ex2 = postExtras[p.id] || {};
    if (ex2.forecast_ac != null && p.performance.accounts_created >= ex2.forecast_ac) briefGroups[key].bf++;
  });
  const briefRows = Object.entries(briefGroups)
    .sort((a,b) => a[0].localeCompare(b[0]))
    .map(([k, d]) => {
      const avg  = d.ecacs.length ? Math.round(d.ecacs.reduce((a,b)=>a+b,0)/d.ecacs.length) : null;
      const best = d.ecacs.length ? Math.min(...d.ecacs) : null;
      const rat  = eCAcRating(avg);
      return `<tr style="border-top:1px solid var(--border)">
        <td style="padding:7px 10px 7px 0;font-size:11px">${d.label}</td>
        <td style="padding:7px 8px;font-size:11px;text-align:right">${d.count}</td>
        <td style="padding:7px 8px;font-size:11px;text-align:right">${d.bf}</td>
        <td style="padding:7px 8px;font-size:12px;text-align:right;font-weight:700;color:var(--${rat.cls})">${avg != null ? '£'+avg : '—'}</td>
        <td style="padding:7px 0;font-size:11px;text-align:right;color:var(--muted)">${best != null ? '£'+best : '—'}</td>
      </tr>`;
    }).join('');

  // Top 10 by eCAC
  const ranked = past.map(p => ({ p, ecac: postEcac(p.performance) }))
    .filter(x => x.ecac != null && x.ecac > 0)
    .sort((a,b) => a.ecac - b.ecac).slice(0,10);
  const topRows = ranked.map((x, i) => {
    const rat = eCAcRating(x.ecac);
    return `<tr style="cursor:pointer;border-top:1px solid var(--border)" onclick="goToPost('${x.p.id}')">
      <td style="padding:7px 8px 7px 0;font-size:11px;color:var(--muted)">${i+1}</td>
      <td style="padding:7px 8px;font-size:12px">${x.p.name}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--muted)">P${x.p.post_sequence}</td>
      <td style="padding:7px 8px;font-size:11px;color:var(--muted)">${x.p.date}</td>
      <td style="padding:7px 0;font-size:13px;font-weight:700;color:var(--${rat.cls})">${rat.emoji} £${x.ecac}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="meta-grid-3" style="margin-bottom:20px">
      <div class="meta-stat-card"><div class="meta-stat-val">${past.length}</div><div class="meta-stat-label">Posts analysed</div></div>
      <div class="meta-stat-card"><div class="meta-stat-val" style="color:var(--green)">${beatForecastPosts.length}</div><div class="meta-stat-label">Beat forecast (${past.length ? Math.round(beatForecastPosts.length/past.length*100) : 0}%)</div></div>
      <div class="meta-stat-card"><div class="meta-stat-val">${avgEcac != null ? '£'+avgEcac : '—'}</div><div class="meta-stat-label">Avg eCAC (from delegations)</div></div>
      <div class="meta-stat-card"><div class="meta-stat-val" style="color:var(--gold)">${under40}</div><div class="meta-stat-label">eCAC under £40 🤑</div></div>
      <div class="meta-stat-card"><div class="meta-stat-val" style="color:var(--green)">${under70}</div><div class="meta-stat-label">eCAC under £70 ★</div></div>
      <div class="meta-stat-card"><div class="meta-stat-val">${ecacs.length ? '£'+Math.min(...ecacs) : '—'}</div><div class="meta-stat-label">Best single post eCAC</div></div>
    </div>

    <div class="meta-grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-head">eCAC distribution (from delegations)</div>
        <div class="card-body">${tierBars}</div>
      </div>
      <div class="card">
        <div class="card-head">Brief compliance — beat-forecast posts (${metaPosts.length})</div>
        <div class="card-body">${bcBars}</div>
      </div>
    </div>

    <div class="meta-grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-head">By niche</div>
        <div class="card-body" style="padding:0 18px">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">
              <th style="text-align:left;padding:10px 12px 8px 0">Niche</th>
              <th style="text-align:right;padding:10px 8px 8px">Posts</th>
              <th style="text-align:right;padding:10px 8px 8px">Beat fc.</th>
              <th style="text-align:right;padding:10px 8px 8px">Avg eCAC</th>
              <th style="text-align:right;padding:10px 0 8px">Best</th>
            </tr></thead>
            <tbody>${nicheRows}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-head">By post sequence</div>
        <div class="card-body" style="padding:0 18px">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">
              <th style="text-align:left;padding:10px 12px 8px 0">Sequence</th>
              <th style="text-align:right;padding:10px 8px 8px">Posts</th>
              <th style="text-align:right;padding:10px 0 8px">Avg eCAC</th>
            </tr></thead>
            <tbody>${seqRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-head">By brief type &amp; post sequence</div>
      <div class="card-body" style="padding:0 18px">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">
            <th style="text-align:left;padding:10px 10px 8px 0">Brief</th>
            <th style="text-align:right;padding:10px 8px 8px">Posts</th>
            <th style="text-align:right;padding:10px 8px 8px">Beat fc.</th>
            <th style="text-align:right;padding:10px 8px 8px">Avg eCAC</th>
            <th style="text-align:right;padding:10px 0 8px">Best</th>
          </tr></thead>
          <tbody>${briefRows}</tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-head">Top 10 posts by eCAC <span style="font-weight:400;color:var(--muted);font-size:11px;text-transform:none;letter-spacing:0">— click to view</span></div>
      <div class="card-body" style="padding:0 18px">
        <table style="width:100%;border-collapse:collapse">
          <tbody>${topRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function goToPost(id) {
  showPage('posts');
  const p = displayPosts.find(x => x.id === id);
  if (!p) return;
  const mk = getMonthKey(p);
  if (mk !== selectedMonthKey) { selectedMonthKey = mk; renderMonthNav(); }
  const idx = getMonthPosts().findIndex(x => x.id === id);
  if (idx >= 0) renderPost(idx);
}

// ── RENDER POST ───────────────────────────────────────────────────────────────
function renderPost(idx) {
  updateArrowNav(idx);
  const mp   = getMonthPosts();
  const p    = mp[idx];
  const ex   = postExtras[p.id] || {};
  const perf = p.performance;

  // eCAC from delegations
  const ecac = postEcac(perf);
  const rat  = eCAcRating(ecac);
  const passCount  = p.brief_compliance.filter(c => c.pass).length;
  const totalCount = p.brief_compliance.length;
  const isStrong   = ecac != null && ecac < 70;
  const strongBadge = isStrong ? '<span class="strong-badge">★ Strong Post · eCAC &lt;£70</span>' : '';

  // Brief type lookup
  const bt = getBriefType(p);
  const btGoalHtml = bt ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5"><strong style="color:var(--text)">Post ${p.post_sequence} goal:</strong> ${bt.goal}</div>` : '';

  const fac = ex.forecast_ac;
  const fcac = ex.forecast_cac;
  const acHit = fac != null && perf.accounts_created != null
    ? Math.round(perf.accounts_created / fac * 100) : null;
  const beatFc  = acHit != null && acHit >= 100;
  const hitStr  = acHit != null ? acHit + '%' : '—';

  // Campaign timeline
  let timelineHtml = '';
  if (p.campaign_timeline && p.campaign_timeline.length > 0) {
    const items = p.campaign_timeline.map((t, i) => {
      const conn    = i === 0 ? '' : '<div class="campaign-tl-connector"></div>';
      const dateStr = t.date ? t.date.slice(5).replace('-', '/') : '—';
      return `${conn}<div class="campaign-tl-item">
        <div class="campaign-tl-dot ${t.status}"></div>
        <div class="campaign-tl-info">
          <div class="campaign-tl-label ${t.status}">${t.label}</div>
          ${t.date ? `<div class="campaign-tl-date">${dateStr}</div>` : ''}
          <div class="campaign-tl-detail">${t.detail}</div>
          ${t.status === 'current' ? '<div class="campaign-tl-now">▲ This post</div>' : ''}
        </div>
      </div>`;
    }).join('');
    timelineHtml = `<div class="campaign-timeline">
      <div class="campaign-tl-header">Campaign</div>
      <div class="campaign-tl-track">${items}</div>
    </div>`;
  }

  const acVal   = perf.accounts_created != null ? perf.accounts_created : '—';
  const facVal  = fac  != null ? fac : '—';
  const ecacVal = ecac != null ? `£${ecac}` : '—';
  const fcacVal = fcac != null ? `£${Math.round(fcac)}` : '—';
  const delVal  = perf.delegations != null ? perf.delegations : '—';
  const lpvVal  = perf.landing_page_views != null ? perf.landing_page_views : '—';
  const feeVal  = perf.post_fee != null ? `£${perf.post_fee}` : '—';

  const metaRows = p.brief_compliance.map(c => {
    const rate = metaRates[c.label] || { pct: 0 };
    const cls  = c.pass ? 'this-pass' : 'this-fail';
    return `<div class="dash-meta-dim ${cls}">
      <span class="dash-meta-this">${c.pass ? '✓' : '✗'}</span>
      <span class="dash-meta-label">${c.label}</span>
      <span class="dash-meta-pct">${rate.pct}% of best</span>
    </div>`;
  }).join('');

  const checkHtml = p.brief_compliance.map(c => `
    <div class="dash-mini-check ${c.pass ? 'pass' : 'fail'}">
      <span style="flex-shrink:0">${c.pass ? '✓' : '✗'}</span>${c.label}
    </div>`).join('');

  // Combined review
  const slackNotes = ex.slack_notes || [];
  let whatWeSaidHtml = '';
  if (slackNotes.length > 0) {
    const matchedLine = ex.slack_matched
      ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">Thread: "${ex.slack_matched.slice(0,80)}…"</div>` : '';
    whatWeSaidHtml = slackNotes.map(n =>
      `<div class="review-comment">"${n}"<div class="review-meta">Slack · #approving-content</div></div>`
    ).join('') + matchedLine;
  } else if (p.review_comments && p.review_comments.length) {
    whatWeSaidHtml = p.review_comments.map(c =>
      `<div class="review-comment">"${c.text}"<div class="review-meta">${c.author} · ${c.source}</div></div>`
    ).join('');
  }

  const goodHtml   = (p.review_reflection.good || []).map(t =>
    `<div class="reflection-row good"><span style="flex-shrink:0">✓</span><div>${t}</div></div>`).join('');
  const missedHtml = (p.review_reflection.missed || []).map(t =>
    `<div class="reflection-row missed"><span style="flex-shrink:0">△</span><div>${t}</div></div>`).join('');
  const hasReflection = goodHtml || missedHtml;

  document.getElementById('main-content').innerHTML = `
    <!-- IMAGE PANEL -->
    <div class="image-panel">
      <div class="story-frame">
        <img src="${p.image}" alt="${p.name}" onerror="this.style.background='#1a1a1a'">
      </div>
      <div class="image-footer">
        <span>${p.format} · ${p.niche} · ${p.date}</span>
        <a class="notion-link" href="${p.notion_url}" target="_blank">↗ Notion</a>
      </div>
    </div>

    <!-- ANALYSIS -->
    <div class="analysis">

      <!-- TITLE -->
      <div class="card"><div class="card-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <div class="post-name">${p.name} — Post ${p.post_sequence}</div>
            ${isStrong ? `<div style="margin-top:6px">${strongBadge}</div>` : ''}
          </div>
          ${p.instagram_url ? `<a href="${p.instagram_url}" target="_blank" class="ig-link">📷 ${p.instagram_handle || 'Instagram'}</a>` : ''}
        </div>
        <div class="post-tags" style="margin-top:8px">
          <span class="tag">${p.format}</span>
          <span class="tag">${p.niche}</span>
          <span class="tag">${p.date}</span>
          <span class="tag">${p.brief_info.niche_brief}</span>
        </div>
        ${timelineHtml}
      </div></div>

      <!-- DASHBOARD ROW -->
      <div class="dashboard-row">

        <!-- Performance -->
        <div class="dash-card">
          <div class="dash-head">Performance</div>
          <div class="dash-body">
            <div class="dash-kpi-pair">
              <div class="dash-kpi">
                <div class="dash-kpi-val ${beatFc ? 'green' : ''}">${acVal}</div>
                <div class="dash-kpi-meta">
                  <span class="dash-kpi-label">Accounts Created</span>
                  <span class="dash-kpi-sub">Forecast: ${facVal}</span>
                </div>
              </div>
              <div class="forecast-row">
                <span style="color:var(--muted)">vs forecast</span>
                <span class="forecast-hit ${beatFc ? 'over' : 'under'}">${hitStr} of target</span>
              </div>
              <hr class="dash-divider">
              <div class="dash-ecac">
                <span class="dash-ecac-emoji">${rat.emoji}</span>
                <div>
                  <div style="font-size:18px;font-weight:800;letter-spacing:-.02em;line-height:1">${ecacVal} implied eCAC</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px">from ${delVal} delegations · Forecast CAC: ${fcacVal}</div>
                </div>
              </div>
              <hr class="dash-divider">
              <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
                <span>${acVal} AC created</span>
                <span>${lpvVal ? lpvVal+' LPVs' : ''}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Brief Compliance -->
        <div class="dash-card">
          <div class="dash-head">${bt ? bt.name : p.brief_info.niche_brief}
            <span style="color:var(--text);font-weight:600;text-transform:none;letter-spacing:0">${passCount}/${totalCount}</span>
          </div>
          <div class="dash-body">
            ${btGoalHtml}
            <div class="dash-mini-checks">${checkHtml}</div>
          </div>
        </div>

        <!-- vs Best Posts -->
        <div class="dash-card">
          <div class="dash-head">vs. Best Posts
            <span style="color:var(--muted);font-size:10px;text-transform:none;letter-spacing:0">(${metaPosts.length} beat fc.)</span>
          </div>
          <div class="dash-body">
            <div class="dash-meta-dims">${metaRows}</div>
          </div>
        </div>

      </div><!-- dashboard-row -->

      <!-- COMBINED REVIEW -->
      <div class="card">
        <div class="card-head">Review</div>
        <div class="card-body" style="padding:0">
          ${whatWeSaidHtml ? `<div style="padding:14px 18px">
            <div class="review-section-label">What we said at the time</div>
            ${whatWeSaidHtml}
          </div>` : ''}
          ${hasReflection ? `<div style="padding:14px 18px${whatWeSaidHtml ? ';border-top:1px solid var(--border)' : ''}">
            <div class="review-section-label">In hindsight</div>
            <div class="reflection-rows">${goodHtml}${missedHtml}</div>
          </div>` : ''}
          ${!whatWeSaidHtml && !hasReflection ? `<div style="padding:18px;color:var(--muted);font-size:13px">No review notes recorded.</div>` : ''}
        </div>
      </div>

    </div><!-- analysis -->
  `;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderMonthNav();
renderPost(0);
</script>
</body>
</html>
